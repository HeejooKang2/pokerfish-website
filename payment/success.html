<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 — POKERFISH</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../component/base.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px 48px;
    }

    .ps-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: var(--black);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .ps-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
    }

    .ps-card {
      width: 100%;
      max-width: 480px;
      background: var(--gray-900);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 48px 36px;
      text-align: center;
    }

    .ps-icon {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 28px;
    }

    .ps-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
    }

    .ps-sub {
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.7;
      margin: 0 0 32px;
    }

    .ps-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      margin-bottom: 32px;
    }
    .ps-table td {
      padding: 11px 4px;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ps-table td:first-child {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-400);
      width: 38%;
    }
    .ps-table td:last-child { color: var(--white); }

    .ps-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: var(--white);
      color: var(--black);
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ps-btn:hover { background: var(--gray-100); }

    @media (max-width: 560px) {
      .ps-header { padding: 0 20px; }
      .ps-card { padding: 36px 20px; }
    }
  </style>
</head>
<body>

  <header class="ps-header">
    <a class="ps-logo" href="../index.html">Pokerfish</a>
  </header>

  <div class="ps-card">
    <div class="ps-icon">✓</div>
    <p class="ps-title">결제가 완료되었습니다</p>
    <p class="ps-sub">주문해 주셔서 감사합니다.<br>배송 준비 후 운송장 번호를 안내해 드립니다.</p>

    <table class="ps-table" id="psTable"></table>

    <a class="ps-btn" href="../index.html">쇼핑 계속하기</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const order  = (() => {
      try { return JSON.parse(sessionStorage.getItem('pf_pending_order') || '{}'); } catch(e) { return {}; }
    })();

    const methodLabel = { card:'신용카드', kakaopay:'카카오페이', naverpay:'네이버페이', bank:'계좌이체' };
    const fmt = n => Number(n).toLocaleString('ko-KR') + '원';

    const rows = [
      ['주문 번호', params.get('orderId') || order.orderId || ''],
      ['결제 금액', params.get('amount') ? fmt(params.get('amount')) : (order.total ? fmt(order.total) : '')],
      ['결제 수단', methodLabel[params.get('method')] || order.payment || ''],
      ['받는 분',   order.name    || ''],
      ['연락처',    order.phone   || ''],
      ['배송지',    order.address || ''],
    ].filter(([, v]) => v);

    document.getElementById('psTable').innerHTML = rows
      .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
      .join('');

    localStorage.removeItem('pf_cart');
    sessionStorage.removeItem('pf_pending_order');
  </script>
</body>
</html>
