<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 실패 — POKERFISH</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../component/base.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px 48px;
    }

    .pf-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: var(--black);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .pf-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
    }

    .pf-card {
      width: 100%;
      max-width: 480px;
      background: var(--gray-900);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 48px 36px;
      text-align: center;
    }

    .pf-icon {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(220,50,50,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #e05555;
      margin: 0 auto 28px;
    }

    .pf-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
    }

    .pf-sub {
      font-size: 12px;
      color: var(--gray-400);
      margin: 0 0 16px;
    }

    .pf-msg {
      font-size: 12px;
      color: #e05555;
      background: rgba(220,50,50,0.08);
      border: 1px solid rgba(220,50,50,0.2);
      padding: 13px 16px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .pf-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: var(--white);
      color: var(--black);
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 10px;
    }
    .pf-btn:hover { background: var(--gray-100); }

    .pf-btn-ghost {
      display: block;
      width: 100%;
      padding: 18px;
      background: none;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .pf-btn-ghost:hover { border-color: var(--white); background: rgba(255,255,255,0.05); }

    @media (max-width: 560px) {
      .pf-header { padding: 0 20px; }
      .pf-card { padding: 36px 20px; }
    }
  </style>
</head>
<body>

  <header class="pf-header">
    <a class="pf-logo" href="../index.html">Pokerfish</a>
  </header>

  <div class="pf-card">
    <div class="pf-icon">✕</div>
    <p class="pf-title">결제에 실패했습니다</p>
    <p class="pf-sub">아래 내용을 확인하고 다시 시도해 주세요.</p>
    <p class="pf-msg" id="pfMsg">알 수 없는 오류가 발생했습니다.</p>

    <button class="pf-btn" onclick="history.back()">다시 시도하기</button>
    <a class="pf-btn-ghost" href="../index.html">홈으로 돌아가기</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const msg = params.get('message');
    if (msg) document.getElementById('pfMsg').textContent = decodeURIComponent(msg);
  </script>
</body>
</html>
